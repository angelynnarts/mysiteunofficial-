<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angelynn Arts</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #F3DEFA;
            overflow: hidden;
        }

        .iframe-container {
            position: fixed;
            top: -60px; /* 👈 hides Wix banner */
            left: 0;
            width: 100%;
            height: calc(100% + 60px); /* compensate */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Slight adjustment for mobile */
        @media (max-width: 768px) {
            .iframe-container {
                top: -70px;
                height: calc(100% + 70px);
            }
        }
    </style>
</head>

<body>
    <div class="iframe-container">
        <iframe src="https://angelynnarts.wixsite.com/angelynnarts" allowfullscreen></iframe>
    </div>
</body>
</html>
