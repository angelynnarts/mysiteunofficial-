<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angelynn Arts</title>

    <style>
        /* RESET + BACKGROUND */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #F3DEFA;
            overflow: hidden; /* prevents all scrolling */
        }

        /* FULLSCREEN IFRAME CONTAINER */
        .iframe-container {
            position: fixed; /* locks it to screen */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* IFRAME */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>

<body>
    <div class="iframe-container">
        <iframe src="https://angelynnarts.wixsite.com/angelynnarts" allowfullscreen></iframe>
    </div>
</body>
</html>
