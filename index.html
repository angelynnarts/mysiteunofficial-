<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angelynn Arts</title>

    <style>
        /* RESET */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow-x: hidden;
            background-color: #ffffff;
        }

        /* IFRAME CONTAINER */
        .iframe-container {
            position: absolute;
            top: -50px;
            left: 0;
            width: 100vw;
            height: calc(100vh + 50px);
        }

        /* IFRAME */
        iframe {
            display: block; /* removes inline gaps */
            width: 100%;
            height: 100%;
            border: none;
        }

        /* MOBILE FIX */
        @media (max-width: 768px) {
            .iframe-container {
                top: -65px;
                height: calc(100vh + 65px);
            }

            iframe {
                transform: scale(1.28);
                transform-origin: top left;
                width: 100vw;
                height: 100vh;
            }
        }
    </style>
</head>

<body>
    <div class="iframe-container">
        <iframe src="https://angelynnarts.wixsite.com/angelynnarts" allowfullscreen></iframe>
    </div>
</body>
</html>
