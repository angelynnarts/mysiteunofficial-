<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* 1. Font Definitions from GitHub */
        @font-face {
            font-family: 'BodoniModa';
            src: url('https://githubusercontent.com') format('truetype');
            font-display: swap;
        }
        @font-face {
            font-family: 'EloquentJF';
            src: url('https://githubusercontent.com') format('truetype');
            font-display: swap;
        }
        @font-face {
            font-family: 'IvyPresto';
            src: url('https://githubusercontent.com') format('truetype');
            font-display: swap;
        }
        @font-face {
            font-family: 'JeanneModerno';
            src: url('https://githubusercontent.com') format('truetype');
            font-display: swap;
        }

        /* 2. Your Original Iframer Layout */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; 
        }
        .iframe-container {
            position: absolute;
            top: -50px; 
            left: 0;
            width: 100%;
            height: calc(100% + 50px); 
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe 
            src="https://angelynnarts.wixsite.com/angelynnarts" 
            style="width:100vw; height:100%;" 
            allowfullscreen>
        </iframe>
    </div>
</body>

</html>
