<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Angelynn Arts</title>
    <style>
        /* 1. Font Definitions using jsDelivr for stability */
        @font-face {
            font-family: 'BodoniModa';
            src: url('https://jsdelivr.net') format('truetype');
            font-display: swap;
        }
        @font-face {
            font-family: 'EloquentJF';
            src: url('https://jsdelivr.net') format('truetype');
            font-display: swap;
        }
        @font-face {
            font-family: 'IvyPresto';
            src: url('https://jsdelivr.net') format('truetype');
            font-display: swap;
        }
        @font-face {
            font-family: 'JeanneModerno';
            src: url('https://jsdelivr.net') format('truetype');
            font-display: swap;
        }

        /* 2. Layout & Banner Fix */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; 
            background-color: #ffffff;
        }

        .iframe-container {
            position: absolute;
            top: -50px; 
            left: 0;
            width: 100%;
            height: calc(100% + 50px);
            display: flex;
        }

        iframe {
            width: 100vw !important;
            height: 100% !important;
            border: none;
            flex-grow: 1;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <!-- Using your EXACT real live link -->
        <iframe src="https://angelynnarts.wixsite.com/angelynnarts" allowfullscreen></iframe>
    </div>
</body>
</html>
