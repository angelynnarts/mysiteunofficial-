<!DOCTYPE html>
<html>
<head>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Prevents double scrollbars */
        }
        .iframe-container {
            position: absolute;
            top: -50px; /* Adjust this value to hide the banner height */
            left: 0;
            width: 100%;
            height: calc(100% + 50px); /* Increases height to compensate for offset */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe src="https://angelynnarts.wixsite.com/angelynnarts" allowfullscreen></iframe>
    </div>
</body>
</html>
